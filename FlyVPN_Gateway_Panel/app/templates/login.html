<!doctype html>
<html lang="ru">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>FlyVPN Login</title><link rel="stylesheet" href="/static/style.css"></head>
<body class="login-body">
  <div class="login-glow"></div>
  <section class="login-card">
    <div class="brand-mark big">🪽</div>
    <h1>FlyVPN Gateway</h1>
    <p>Secure control panel</p>
    {% if flash %}<div class="toast {{ flash.kind }}">{{ flash.text }}</div>{% endif %}
    <form method="post" class="login-form">
      <input name="username" placeholder="Логин" autocomplete="username" autofocus>
      <input name="password" type="password" placeholder="Пароль" autocomplete="current-password">
      <button class="primary">Войти в панель</button>
    </form>
  </section>
</body>
</html>
